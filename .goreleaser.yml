version: 2

project_name: gitant-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: gitant
    main: ./cmd/gitant/
    binary: gitant
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/GrayCodeAI/gitant-cli/internal/version.Version={{.Version}}
      - -X github.com/GrayCodeAI/gitant-cli/internal/version.Commit={{.Commit}}
      - -X github.com/GrayCodeAI/gitant-cli/internal/version.BuildTime={{.Date}}

  - id: git-remote-gitant
    main: ./cmd/git-remote-gitant/
    binary: git-remote-gitant
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README*

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: GrayCodeAI
    name: gitant-cli
  prerelease: auto
